<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频列表网格布局</title>
    <style>
        /* 基础样式 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 网格容器：自适应排列 */
        .video-grid {
            display: grid;
            /* 自动填充列，每列最小宽度 240px */
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px; /* 卡片之间的间距 */
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 单个卡片容器 */
        .video-card {
            text-decoration: none; /* 取消链接下划线 */
            color: #18191c;
            display: flex;
            flex-direction: column;
            transition: opacity 0.2s;
        }

        .video-card:hover .image-container img {
            transform: scale(1.05); /* 鼠标悬停图片微放 */
        }

        /* 图片容器（比例固定） */
        .image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* 强制 16:9 比例 */
            border-radius: 8px;
            overflow: hidden;
            background-color: #e3e5e7;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证图片铺满不变形 */
            transition: transform 0.3s ease;
        }

        /* 图片上的数据遮罩（播放量等） */
        .stats-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            color: white;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        /* 标题样式 */
        .video-title {
            margin: 10px 0 6px 0;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 最多显示两行 */
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 42px; /* 固定高度防止错位 */
        }

        /* 时间/日期样式 */
        .video-meta {
            font-size: 13px;
            color: #9499a0;
        }
    </style>
</head>
<body>

<div class="video-grid">



        <a href="https://www.bilibili.com/video/BV1fDosBCEko/?spm_id_from=333.1387.homepage.video_card.click" class="video-card">
